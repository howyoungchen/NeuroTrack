        <path d="M10 22l5 5 10-12" fill="none" stroke="#515AA3" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="55" cy="22" r="17" fill="#E8E8EF"/>
        <circle cx="93" cy="22" r="17" fill="#E8E8EF"/>
        <circle cx="131" cy="22" r="17" fill="#E8E8EF"/>
        <circle cx="169" cy="22" r="17" fill="#E8E8EF"/>
        <circle cx="207" cy="22" r="17" fill="#E8E8EF"/>
