<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">NeuroTrack / 心迹</title>
  <desc id="desc">观察压力趋势和睡眠节奏，数据保存在本机</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F8FC"/>
      <stop offset="0.58" stop-color="#F0F0F7"/>
      <stop offset="1" stop-color="#E0E0FF"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F806D"/>
      <stop offset="1" stop-color="#4B5290"/>
    </linearGradient>
    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#22275B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="40" fill="url(#background)"/>
  <circle cx="1102" cy="68" r="150" fill="#B7F2DB" opacity="0.42"/>
  <circle cx="48" cy="548" r="125" fill="#FFE9AE" opacity="0.36"/>

  <g transform="translate(76 0)">
    <text x="0" y="132" fill="#1A1B25" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="54" font-weight="700">NeuroTrack / 心迹</text>
    <text x="0" y="195" fill="#353B73" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="31" font-weight="600">看见变化，早点照顾自己</text>
    <text x="0" y="237" fill="#5D5E6B" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="22">我给自己写的 Android 小工具</text>

    <g transform="translate(0 306)">
      <g>
        <rect width="164" height="48" rx="24" fill="#FFFFFF" opacity="0.9"/>
        <circle cx="25" cy="24" r="8" fill="#4B5290"/>
        <text x="46" y="31" fill="#353B73" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">压力趋势</text>
      </g>

      <g transform="translate(176 0)">
        <rect width="164" height="48" rx="24" fill="#FFFFFF" opacity="0.9"/>
        <path d="M9.37 5.51A7.35 7.35 0 0 0 9 7.8a7.2 7.2 0 0 0 7.2 7.2 7.35 7.35 0 0 0 2.29-.37A7.5 7.5 0 1 1 9.37 5.51Z" fill="#916B00" transform="translate(7 3) scale(1.35)"/>
        <text x="46" y="31" fill="#353B73" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">睡眠节奏</text>
      </g>

      <g transform="translate(352 0)">
        <rect width="164" height="48" rx="24" fill="#FFFFFF" opacity="0.9"/>
        <path d="M25 13l10 4v8c0 7-4 12-10 15-6-3-10-8-10-15v-8l10-4Z" fill="#2F806D"/>
        <path d="M20.5 25.5l3.2 3.2 6.8-8" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="31" fill="#353B73" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">本地优先</text>
      </g>
    </g>

    <text x="0" y="404" fill="#5D5E6B" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">不注册 · 不上传 · 不催打卡</text>
  </g>

  <g transform="translate(680 48)" filter="url(#panel-shadow)">
    <rect width="448" height="424" rx="36" fill="#FFFFFF"/>

    <g transform="translate(28 28)">
      <rect width="392" height="196" rx="24" fill="#F8F8FC"/>
      <text x="24" y="36" fill="#5D5E6B" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">近一个月压力变化</text>
      <text x="368" y="36" text-anchor="end" fill="#8A8B98" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">30 天</text>
      <path d="M24 78H368M24 116H368M24 154H368" fill="none" stroke="#E7E7F0" stroke-width="1.5"/>
      <path d="M24 154C70 145 91 146 130 126C170 105 194 116 230 91C266 66 306 77 368 52V168H24Z" fill="#E0E0FF" opacity="0.72"/>
      <path d="M24 154C70 145 91 146 130 126C170 105 194 116 230 91C266 66 306 77 368 52" fill="none" stroke="#4B5290" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="368" cy="52" r="8" fill="#4B5290"/>
    </g>

    <g transform="translate(28 240)">
      <rect width="188" height="156" rx="24" fill="#EAF7F3"/>
      <path d="M9.37 5.51A7.35 7.35 0 0 0 9 7.8a7.2 7.2 0 0 0 7.2 7.2 7.35 7.35 0 0 0 2.29-.37A7.5 7.5 0 1 1 9.37 5.51Z" fill="#2F806D" transform="translate(50 7) scale(4.4)"/>
      <text x="94" y="121" text-anchor="middle" fill="#1A1B25" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="600">睡眠节奏</text>
      <text x="94" y="144" text-anchor="middle" fill="#5D5E6B" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">看看作息变化</text>
    </g>

    <g transform="translate(232 240)">
      <rect width="188" height="156" rx="24" fill="#FFF6DE"/>
      <path d="M94 24l25 11v20c0 18-11 30-25 38-14-8-25-20-25-38V35l25-11Z" fill="url(#shield)"/>
      <path d="M82 57l8.5 8.5 17.5-21" fill="none" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="94" y="121" text-anchor="middle" fill="#1A1B25" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="600">数据留在本机</text>
      <text x="94" y="144" text-anchor="middle" fill="#5D5E6B" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="14">不注册 · 不上传</text>
    </g>
