    <text x="0" y="194" fill="#454D92" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="31" font-weight="650">看见这一周，也给自己一点安静</text>
    <text x="0" y="238" fill="#656673" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="21">我给自己写的 Android 小工具</text>

    <g transform="translate(0 304)">
      <g>
        <rect width="158" height="50" rx="25" fill="#FFFFFF" opacity="0.94"/>
        <path d="M20 30l8-8 7 5 11-13" fill="none" stroke="#515AA3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="56" y="32" fill="#363B74" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">周压力</text>
      </g>
      <g transform="translate(172 0)">
        <rect width="158" height="50" rx="25" fill="#FFFFFF" opacity="0.94"/>
        <circle cx="25" cy="25" r="12" fill="none" stroke="#2F8C78" stroke-width="2.5"/>
        <circle cx="25" cy="25" r="5" fill="#2F8C78"/>
        <text x="49" y="32" fill="#285F54" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">正念练习</text>
      </g>
      <g transform="translate(344 0)">
