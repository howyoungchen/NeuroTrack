<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">NeuroTrack / 心迹</title>
  <desc id="desc">回看一周的压力，认真完成正念，数据留在本机</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAFAFD"/>
      <stop offset="0.58" stop-color="#F2F2FA"/>
      <stop offset="1" stop-color="#E4E5FF"/>
    </linearGradient>
    <linearGradient id="pressure" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2F8C78"/>
      <stop offset="0.56" stop-color="#A77B00"/>
      <stop offset="1" stop-color="#C43F32"/>
    </linearGradient>
    <linearGradient id="practice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6169B1"/>
      <stop offset="1" stop-color="#2F8C78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="155%">
      <feDropShadow dx="0" dy="14" stdDeviation="19" flood-color="#262B61" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="540" rx="40" fill="url(#bg)"/>
  <circle cx="1110" cy="62" r="158" fill="#BCEEDC" opacity="0.48"/>
  <circle cx="45" cy="548" r="132" fill="#FFE7A9" opacity="0.42"/>
  <path d="M570 55c52 18 74 63 57 106-17 42-68 65-115 45-46-19-68-68-48-108 20-40 59-58 106-43Z" fill="#DCDDFE" opacity="0.42"/>

