        <text x="49" y="32" fill="#6E5508" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">本地优先</text>
      </g>
    </g>

    <text x="0" y="413" fill="#656673" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">不注册 · 不上传 · 不按天催打卡</text>
  </g>

